name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check . --select=E,F,W,I --ignore=E501

      - name: Run environment + grader tests (CPU only, no GPU needed)
        run: |
          pytest tests/test_environment.py tests/test_grader.py -v --tb=short

      - name: Run reward function tests (CPU-safe subset)
        run: |
          pytest tests/test_reward_functions.py -v --tb=short \
            -k "TestExtractAction or TestFormatReward or TestAntiCheatReward or TestDiversityReward or TestBatchConsistency"

  docker:
    name: Docker Build + Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t incident-ops-openenv:ci .

      - name: Smoke-test server starts and responds
        run: |
          docker run -d --name test_server -p 7860:7860 incident-ops-openenv:ci
          sleep 8
          curl -f http://localhost:7860/health || exit 1
          docker stop test_server
          docker rm test_server
